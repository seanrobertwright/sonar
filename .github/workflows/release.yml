name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('{0}-dev', github.ref_name) }}"
          go build -ldflags="-s -w -X github.com/raskrebs/sonar/internal/selfupdate.Version=${VERSION}" -o sonar .
          tar czf sonar_linux_${{ matrix.goarch }}.tar.gz sonar

      - uses: actions/upload-artifact@v4
        with:
          name: sonar_linux_${{ matrix.goarch }}
          path: sonar_linux_${{ matrix.goarch }}.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Go binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('{0}-dev', github.ref_name) }}"
          go build -ldflags="-s -w -X github.com/raskrebs/sonar/internal/selfupdate.Version=${VERSION}" -o sonar .
          codesign -s - sonar

      - name: Build Swift tray app
        run: |
          swiftc -O -o sonar-tray tray/SonarTray.swift \
            -target ${{ matrix.goarch == 'amd64' && 'x86_64' || 'arm64' }}-apple-macos13

      - name: Package
        run: |
          tar czf sonar_darwin_${{ matrix.goarch }}.tar.gz sonar sonar-tray

      - uses: actions/upload-artifact@v4
        with:
          name: sonar_darwin_${{ matrix.goarch }}
          path: sonar_darwin_${{ matrix.goarch }}.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('{0}-dev', github.ref_name) }}"
          go build -ldflags="-s -w -X github.com/raskrebs/sonar/internal/selfupdate.Version=${VERSION}" -o sonar.exe .
          zip sonar_windows_${{ matrix.goarch }}.zip sonar.exe

      - uses: actions/upload-artifact@v4
        with:
          name: sonar_windows_${{ matrix.goarch }}
          path: sonar_windows_${{ matrix.goarch }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sonar_*.tar.gz
            sonar_*.zip

  bump-homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v5
        with:
          repository: raskrebs/homebrew-sonar
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/raskrebs/sonar/releases/download/${TAG}"

          declare -A SHAS
          for asset in \
            sonar_darwin_arm64.tar.gz \
            sonar_darwin_amd64.tar.gz \
            sonar_linux_arm64.tar.gz \
            sonar_linux_amd64.tar.gz; do
            curl -fsSL -o "$asset" "${BASE}/${asset}"
            SHAS[$asset]=$(sha256sum "$asset" | awk '{print $1}')
          done

          FORMULA=tap/Formula/sonar.rb
          python3 - <<EOF
          import re, os
          path = "$FORMULA"
          version = "$VERSION"
          tag = "$TAG"
          shas = {
              "darwin_arm64": "${SHAS[sonar_darwin_arm64.tar.gz]}",
              "darwin_amd64": "${SHAS[sonar_darwin_amd64.tar.gz]}",
              "linux_arm64":  "${SHAS[sonar_linux_arm64.tar.gz]}",
              "linux_amd64":  "${SHAS[sonar_linux_amd64.tar.gz]}",
          }
          src = open(path).read()
          src = re.sub(r'version "[^"]+"', f'version "{version}"', src, count=1)
          for key, sha in shas.items():
              # update url for this arch
              src = re.sub(
                  rf'(sonar_{key}\.tar\.gz")\s*\n(\s*)sha256 "[0-9a-f]+"',
                  rf'\1\n\2sha256 "{sha}"',
                  src,
              )
          # bump tag in all release URLs
          src = re.sub(r'/releases/download/v[^/]+/', f'/releases/download/{tag}/', src)
          open(path, "w").write(src)
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formula changes"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sonar.rb
          git commit -m "sonar ${TAG}"
          git push origin main
